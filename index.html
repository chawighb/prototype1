<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHB HaaS – Feature Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Kanit',sans-serif;background:#0D0D14;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;color:#fff}
.shell{width:100%;max-width:430px;display:flex;flex-direction:column;align-items:center;padding:16px 14px 14px;position:relative}
.top-bar{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ghb-badge{font-size:13px;font-weight:900;color:#fff;display:flex;align-items:center;gap:6px}
.ghb-badge .dot{width:8px;height:8px;border-radius:50%;background:#FF6B00;animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.step-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.35)}
.caption{width:100%;text-align:center;margin-bottom:12px;min-height:66px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cap-tag{font-size:10px;font-weight:700;color:#FF6B00;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;opacity:0;animation:fadeUp .4s .05s ease both}
.cap-title{font-size:clamp(15px,4vw,19px);font-weight:900;line-height:1.25;opacity:0;animation:fadeUp .4s .15s ease both}
.cap-sub{font-size:12px;color:rgba(255,255,255,.45);font-weight:500;margin-top:4px;line-height:1.5;max-width:300px;opacity:0;animation:fadeUp .4s .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.phone-wrap{position:relative;width:100%;max-width:252px;filter:drop-shadow(0 20px 40px rgba(0,0,0,.7))}
.phone-frame{background:#18181C;border-radius:38px;border:2px solid rgba(255,255,255,.1);overflow:hidden;position:relative;aspect-ratio:9/16.5;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:85px;height:24px;background:#18181C;border-radius:0 0 15px 15px;z-index:30}
.phone-screen{position:absolute;inset:0;background:#F5F5F7;display:flex;flex-direction:column;overflow:hidden}
.hand{position:absolute;z-index:50;pointer-events:none;font-size:26px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4));transition:left .6s cubic-bezier(.34,1.2,.64,1),top .6s cubic-bezier(.34,1.2,.64,1),transform .15s;display:none}
.hand.tap{transform:scale(.7) rotate(-15deg)!important;transition:transform .08s}
.ring{position:absolute;pointer-events:none;z-index:25;border-radius:inherit;box-shadow:0 0 0 3px rgba(255,107,0,.9),0 0 0 7px rgba(255,107,0,.25),0 0 20px rgba(255,107,0,.3);animation:rp 1.5s ease-in-out infinite;transition:all .5s cubic-bezier(.34,1.4,.64,1);opacity:0}
@keyframes rp{0%,100%{box-shadow:0 0 0 3px rgba(255,107,0,.9),0 0 0 7px rgba(255,107,0,.25),0 0 20px rgba(255,107,0,.3)}50%{box-shadow:0 0 0 3px #FF6B00,0 0 0 12px rgba(255,107,0,.35),0 0 30px rgba(255,107,0,.4)}}
.tip{position:absolute;background:linear-gradient(135deg,#FF8C32,#FF6B00);border-radius:11px;padding:7px 11px;font-size:10px;font-weight:700;color:#fff;z-index:40;box-shadow:0 6px 18px rgba(255,107,0,.45);max-width:155px;line-height:1.4;text-align:center;opacity:0;pointer-events:none;transition:opacity .3s}
.tip.show{opacity:1}
.tip::after{content:'';position:absolute;width:8px;height:8px;background:#FF8C32;bottom:-4px;left:50%;transform:translateX(-50%) rotate(45deg)}
/* MINI UI */
.mh{background:#fff;padding:9px 13px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid #E8E8ED;flex-shrink:0;padding-top:28px}
.mav{width:27px;height:27px;border-radius:50%;background:linear-gradient(135deg,#FF8C32,#FF6B00);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:800;flex-shrink:0}
.mun{font-size:9px;font-weight:700;color:#1C1C1E}
.mtier{font-size:6px;color:#FF6B00;font-weight:700;background:#FFF3E8;padding:1px 5px;border-radius:10px;display:inline-block;margin-top:1px}
.mlogo{font-size:11px;font-weight:900;color:#1C1C1E}
.mlogo span{color:#FF6B00}
.mbellw{position:relative;width:23px;height:23px;background:#F5F5F7;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mbadge{position:absolute;top:-3px;right:-3px;width:10px;height:10px;background:#FF3B30;border-radius:50%;font-size:6px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff}
.mc{flex:1;overflow:hidden;background:#F5F5F7;position:relative}
.mc.scroll{overflow-y:auto}
.mhero{margin:8px;background:linear-gradient(135deg,#FF8C32,#FF6B00);border-radius:13px;padding:11px;color:#fff}
.mscore{font-size:32px;font-weight:900;line-height:1}
.mpills{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.mpill{background:rgba(255,255,255,.2);border-radius:12px;padding:2px 7px;font-size:7px;font-weight:700}
.mpill.w{background:rgba(255,255,255,.35)}
.mci{margin:0 8px 5px;background:#fff;border-radius:9px;padding:8px;display:flex;align-items:center;gap:7px;border:.5px solid #E8E8ED}
.mcic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mbd{font-size:6px;font-weight:700;padding:2px 5px;border-radius:8px;white-space:nowrap}
.mni-item{margin:0 8px 5px;background:#FFFCF9;border-radius:9px;padding:8px;display:flex;gap:7px;border:.5px solid rgba(255,107,0,.2);position:relative}
.mni-item::after{content:'';position:absolute;top:8px;right:8px;width:5px;height:5px;border-radius:50%;background:#FF6B00}
.mnicon{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.msg{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:0 8px 5px}
.msc{background:#fff;border-radius:9px;padding:8px 5px;text-align:center;border:.5px solid #E8E8ED}
.msi{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px}
.mlcard{margin:0 8px 5px;background:#fff;border-radius:9px;padding:10px;border:.5px solid #E8E8ED}
.mlcard.hi{background:#FFF8F0;border-color:rgba(255,107,0,.2)}
.mjstats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:0 8px 5px}
.mjstat{background:#fff;border-radius:7px;padding:6px;text-align:center;border:.5px solid #E8E8ED}
.mtrack{margin:0 8px 5px;background:#FFF3E8;border-radius:9px;padding:8px;border:.5px solid rgba(255,107,0,.2)}
.mbnav{background:#fff;border-top:.5px solid #E8E8ED;display:flex;padding:6px 0;flex-shrink:0}
.mni{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px}
.mnl{font-size:7px;font-weight:700}
.mni.a .mnl{color:#FF6B00}
.mni svg{width:15px;height:15px}
.mni.a svg{stroke:#FF6B00}
.mni:not(.a) svg{stroke:#8E8E93}
.mni:not(.a) .mnl{color:#8E8E93}
.mkbrow{display:flex;gap:6px;overflow-x:visible;padding:0 8px 8px}
.mkbc{flex-shrink:0;width:105px;background:#fff;border-radius:9px;overflow:hidden;border:.5px solid #E8E8ED}
.mkbimg{height:54px;display:flex;align-items:flex-end;padding:5px}
.mkbbody{padding:5px 7px 7px}
.mhist{margin:0 8px 4px;background:#fff;border-radius:8px;padding:7px;display:flex;align-items:center;gap:6px;border:.5px solid #E8E8ED}
.mhico{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mpc{margin:0 8px 5px;background:#fff;border-radius:10px;padding:10px;border:.5px solid #E8E8ED}
.mpc.hl{border-color:#007AFF;border-width:1.5px}
.mpc.dk{background:linear-gradient(135deg,#1C1C1E,#3A3A3C)}
/* dots & controls */
.dots-row{display:flex;gap:5px;margin-top:12px}
.dot-i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .4s;cursor:pointer}
.dot-i.active{width:20px;border-radius:4px;background:#FF6B00}
.dot-i.done{background:rgba(255,107,0,.35)}
.controls{display:flex;align-items:center;gap:10px;margin-top:14px}
.cb{background:rgba(255,255,255,.07);border:none;border-radius:10px;padding:8px 16px;font-size:12px;font-weight:700;color:rgba(255,255,255,.6);cursor:pointer;font-family:inherit;transition:all .15s}
.cb:hover{background:rgba(255,255,255,.12);color:#fff}
.cb.p{background:linear-gradient(135deg,#FF8C32,#FF6B00);color:#fff;padding:8px 18px}
.timer-wrap{width:100%;max-width:252px;height:3px;background:rgba(255,255,255,.08);border-radius:4px;margin-top:9px;overflow:hidden}
.timer-bar{height:100%;background:linear-gradient(90deg,#FF8C32,#FF6B00);border-radius:4px;width:0%;transition:width linear}
.phone-screen.out{animation:so .3s ease forwards}
.phone-screen.in{animation:si .35s ease forwards}
@keyframes so{to{opacity:0;transform:translateX(-18px)}}
@keyframes si{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>

let cur=0,playing=true,timer=null,prevHide=null;

// init dots
const dotsEl=document.getElementById('dots');
slides.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot-i';d.id='di'+i;
  d.onclick=()=>{stopT();goTo(i);if(playing)startT();};
  dotsEl.appendChild(d);
});

function updDots(){
  slides.forEach((_,i)=>{
    const d=document.getElementById('di'+i);
    d.className='dot-i'+(i===cur?' active':i<cur?' done':'');
  });
}

function updL(v){
  v=parseInt(v);
  const pct=Math.round(((v-100000)/1100000)*100);
  const r=2.5/100/12,n=36;
  const m=Math.round(v*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1));
  const ld=document.getElementById('ldisp'),lm=document.getElementById('lmonth'),lp=document.getElementById('lprog');
  if(ld)ld.textContent='฿'+v.toLocaleString();
  if(lm)lm.textContent='฿'+m.toLocaleString();
  if(lp)lp.style.width=pct+'%';
}

function render(idx){
  const s=slides[idx];
  if(prevHide){prevHide();prevHide=null;}
  const sc=document.getElementById('screen');
  sc.classList.add('out');
  setTimeout(()=>{
    sc.classList.remove('out');
    sc.innerHTML=s.html;
    sc.classList.add('in');
    setTimeout(()=>sc.classList.remove('in'),400);
    if(s.onShow)s.onShow();
    if(s.onHide)prevHide=s.onHide;
    // highlight
    setTimeout(()=>{
      const target=s.hl?.id?document.getElementById(s.hl.id):null;
      const ring=document.getElementById('ring');
      const tip=document.getElementById('tip');
      const hand=document.getElementById('hand');
      if(target&&ring){
        const pf=document.querySelector('.phone-frame');
        const pr=pf.getBoundingClientRect();
        const tr=target.getBoundingClientRect();
        ring.style.cssText=`position:absolute;left:${tr.left-pr.left-3}px;top:${tr.top-pr.top-3}px;width:${tr.width+6}px;height:${tr.height+6}px;border-radius:13px;opacity:1;`;
        if(s.hl.tip){
          const tx=tr.left-pr.left+tr.width/2;
          const ty=tr.top-pr.top-38;
          tip.textContent=s.hl.tip;
          tip.style.cssText=`left:${Math.min(Math.max(tx-78,3),pr.width-158)}px;top:${ty<28?tr.top-pr.top+tr.height+5:ty}px;opacity:0;`;
          tip.className='tip';
          setTimeout(()=>tip.classList.add('show'),220);
        }
      } else {
        if(ring)ring.style.opacity='0';
        if(tip)tip.classList.remove('show');
      }
      if(hand&&s.hand){
        hand.style.display='block';
        hand.style.left=s.hand.x;
        hand.style.top=s.hand.y;
        [600,1400].forEach(t=>setTimeout(()=>{hand.classList.add('tap');setTimeout(()=>hand.classList.remove('tap'),130);},t));
      }
    },360);
  },280);
  // caption
  const ct=document.getElementById('ctag'),ci=document.getElementById('ctitle'),cs=document.getElementById('csub');
  [ct,ci,cs].forEach(el=>{el.style.animation='none';void el.offsetWidth;el.style.animation='';});
  ct.textContent=s.tag;ci.textContent=s.title;cs.textContent=s.sub;
  document.getElementById('slbl').textContent=String(idx+1).padStart(2,'0')+' / '+String(slides.length).padStart(2,'0');
  updDots();
}

function startTBar(){
  const b=document.getElementById('tbar');
  b.style.transition='none';b.style.width='0%';
  void b.offsetWidth;
  b.style.transition=`width ${DUR}ms linear`;b.style.width='100%';
}
function stopT(){if(timer)clearInterval(timer);}
function startT(){stopT();startTBar();timer=setInterval(()=>{cur=(cur+1)%slides.length;render(cur);startTBar();},DUR);}
function goTo(idx){cur=idx;render(cur);startTBar();}
function next(){stopT();cur=(cur+1)%slides.length;render(cur);if(playing)startT();}
function prev(){stopT();cur=(cur-1+slides.length)%slides.length;render(cur);if(playing)startT();}
function togglePlay(){
  playing=!playing;
  const b=document.getElementById('pbtn');
  if(playing){b.textContent='⏸ หยุด';startT();}
  else{stopT();b.textContent='▶ เล่น';document.getElementById('tbar').style.transition='none';}
}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key===' '){e.preventDefault();togglePlay();}});
let tx=0;
document.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){if(dx<0)next();else prev();}},{passive:true});
render(0);startT();
</script>
</body>
</html>
